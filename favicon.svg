<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4a7eb8"/>
      <stop offset="100%" stop-color="#2d1b58"/>
    </linearGradient>
    <clipPath id="arch">
      <path d="M8,100 L8,46 A42,42 0 0,1 92,46 L92,100 Z"/>
    </clipPath>
  </defs>

  <!-- Arch shape -->
  <path d="M8,100 L8,46 A42,42 0 0,1 92,46 L92,100 Z" fill="url(#g)"/>

  <!-- Bear/wolf silhouette -->
  <g clip-path="url(#arch)" fill="white">
    <!-- Body / chest mass -->
    <path d="M10,100 L10,72 Q12,60 22,54 Q30,48 38,46 Q44,44 48,42
             L56,28 Q58,25 62,27 Q65,29 63,33
             L55,48 Q68,46 75,52 Q80,57 78,68
             Q76,80 70,90 Q62,100 50,100 Z"/>
    <!-- Nose bump -->
    <ellipse cx="38" cy="46" rx="7" ry="5"/>
    <!-- Eye (dark cutout) -->
    <circle cx="42" cy="54" r="3.5" fill="#2d1b58"/>
  </g>

  <!-- Gold 4-pointed star -->
  <path d="M74,24 L76.5,16 L79,24 L87,26.5 L79,29 L76.5,37 L74,29 L66,26.5 Z"
        fill="#f5c542"/>
</svg>
